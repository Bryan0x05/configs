set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# ===== changes =====
# No confirmation on pane kill
bind-key x kill-pane 

# No confirmation on window kill
bind-key & kill-window

# Open panes in current dir
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Start windows and panes at 1 instead
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
# Keep window numbers contingous starting from start index ( 1 )
set-option -g renumber-windows on

set -g history-limit 10000


# ===== plugins =====
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'
run '~/.tmux/plugins/tpm/bin/install_plugins'
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# True colors support
set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

# ===== looks =====

# Window indicators
set -g window-status-format "●"
set -g window-status-current-format "●"

# Mininmal colored window indicators

# Purple: Active, Yellow: Zoomed pane, Red: Pane w/ bell character
set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=magenta\#,nobold}"

# Show yellow for non-active windows too
set -g window-status-style "#{?window_zoomed_flag,fg=yellow,default}"
set -g window-status-bell-style "fg=red,nobold"

# pane separators
set -g pane-border-lines simple
run-shell ~/clone/path/resurrect.tmux
